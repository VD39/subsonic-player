name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch 🛎
        uses: actions/checkout@v6

      - name: Setup node env 🏗
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies 👨🏻‍💻
        run: yarn --frozen-lockfile

      - name: Build 📦
        run: yarn build

      - name: Run linter 👀
        run: yarn lint

      - name: Run tests 🧪
        run: yarn test
